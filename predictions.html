<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeritX - College Predictions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Upgraded filter and table styles perfectly matching the index.html theme */
        .filter-section { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            padding: 30px; 
            border-radius: 30px; 
            margin: 40px 5%; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            align-items: flex-end; 
            box-shadow: var(--shadow-lg); 
            border: 1px solid rgba(139, 92, 246, 0.2); 
        }
        .filter-group { display: flex; flex-direction: column; gap: 10px; }
        .filter-group label { font-size: 0.9rem; font-weight: 600; color: var(--primary); }
        
        select, input { 
            padding: 12px 15px; 
            border-radius: 12px; 
            border: 1px solid #e5e7eb; 
            outline: none; 
            background: #fff; 
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }
        select:focus, input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        
        .table-container { 
            width: 90%; 
            margin: 0 auto 50px auto; 
            overflow-x: auto; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            box-shadow: var(--shadow-lg); 
            border: 1px solid rgba(139, 92, 246, 0.2); 
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 1000px; }
        th { 
            background: var(--gradient); 
            color: white; 
            padding: 18px 15px; 
            text-align: left; 
            position: sticky; 
            top: 0; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        td { padding: 15px; border-bottom: 1px solid #f3f4f6; color: var(--dark); }
        tr { transition: var(--transition); }
        tr:hover { background: rgba(139, 92, 246, 0.05); }
    </style>
</head>
<body>
    <header>
        <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 12px;">
            <img src="logo.png" alt="MeritX Logo" style="max-height: 50px; width: auto;">
            <div class="logo">Merit<span>X</span></div>
        </a>
        
        <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
        </div>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About Us</a></li>
                <li><a href="index.html#contact">Contact Us</a></li>
                <li><a href="predictions.html" class="active">Prediction List</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="filter-section fade-up">
            <div class="filter-group">
                <label>Percentile Range</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="min-perc" placeholder="Min" step="0.01" value="0" style="width: 90px;">
                    <span style="color: #6B7280; font-weight: 500;">to</span>
                    <input type="number" id="max-perc" placeholder="Max" step="0.01" value="100" style="width: 90px;">
                </div>
            </div>
            <div class="filter-group">
                <label>Category</label>
                <select id="filter-category"><option value="ALL">All Categories</option></select>
            </div>
            <div class="filter-group">
                <label>Round</label>
                <select id="filter-round">
                    <option value="ALL">All Rounds</option>
                    <option value="I">Round 1</option>
                    <option value="II">Round 2</option>
                    <option value="III">Round 3</option>
                </select>
            </div>
            <div class="filter-group" style="flex:1;">
                <label>Branch / Course</label>
                <select id="filter-course"><option value="ALL">All Branches</option></select>
            </div>
            <button id="btn-search" class="btn btn-primary" style="margin-bottom: 2px;">Apply Filters</button>
        </div>

        <div class="table-container fade-up delay-1">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>College Name</th>
                        <th>Course Name</th>
                        <th>Category</th>
                        <th>Admission Type</th>
                        <th>Round</th>
                        <th>2025 %ile</th>
                        <th>Predicted 2026</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="8" style="text-align:center; padding: 50px;">Initializing filters...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MeritX College Predictor. All rights reserved.</p>
    </footer>

    <script src="js/predictions.js"></script>
    
    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            const icon = hamburger.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // Close menu when a nav link is clicked
        document.querySelectorAll('#nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                hamburger.querySelector('i').classList.add('fa-bars');
                hamburger.querySelector('i').classList.remove('fa-times');
            });
        });

        // ===== LIQUID BACKGROUND =====
        (function() {
            const canvas = document.createElement('canvas');
            canvas.id = 'liquid-canvas';
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            let width, height;
            let time = 0;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                canvas.style.position = 'fixed';
                canvas.style.top = '0';
                canvas.style.left = '0';
                canvas.style.zIndex = '-1';
                canvas.style.pointerEvents = 'none';
            }
            resize();
            window.addEventListener('resize', resize);

            function drawBlob(x, y, size, speed, color) {
                let t = time * speed;
                let distortion = Math.sin(t) * 20;
                ctx.beginPath();
                for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
                    let r = size + distortion * Math.sin(angle * 3 + t);
                    let px = x + Math.cos(angle) * r;
                    let py = y + Math.sin(angle) * r;
                    if (angle === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.3;
                ctx.fill();
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                drawBlob(width * 0.3, height * 0.4, 200, 0.5, 'rgba(108, 92, 231, 0.3)');
                drawBlob(width * 0.7, height * 0.6, 250, 0.3, 'rgba(0, 184, 148, 0.3)');
                drawBlob(width * 0.5, height * 0.8, 180, 0.7, 'rgba(253, 203, 110, 0.3)');
                time += 0.02;
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body>
</html>
